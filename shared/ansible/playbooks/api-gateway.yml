---
- name: Configure Consul API gateway and intentions
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  vars:
    consul_cacert: "{{ consul_cacert | default('../../aws/certs/datacenter_ca.cert') }}"
    consul_http_addr: "{{ consul_http_addr | default(lookup('env', 'CONSUL_HTTP_ADDR')) }}"
    consul_http_token: "{{ consul_http_token | default(lookup('env', 'CONSUL_HTTP_TOKEN')) }}"
    consul_tls_server_name: "{{ consul_tls_server_name | default(lookup('env', 'CONSUL_TLS_SERVER_NAME')) }}"
    jwt_file: /tmp/consul-auth-method-nomad-workloads.json
    binding_rule_file: /tmp/consul-binding-rule-nomad-workloads.json
    ssl_conf_file: /tmp/gateway-api-ca-config.cnf
    ssl_key_file: /tmp/gateway-api-cert.key
    ssl_csr_file: /tmp/gateway-api-cert.csr
    ssl_crt_file: /tmp/gateway-api-cert.crt
    gw_certificate_file: /tmp/config-gateway-api-certificate.hcl
    gw_config_file: /tmp/config-gateway-api.hcl
    gw_route_file: /tmp/config-gateway-api-tcp-route.hcl

  tasks:
    - name: Clean previous configurations
      block:
        - name: Delete route
          ansible.builtin.command:
            argv: [consul, config, delete, -kind, http-route, -name, hashicups-http-route]
          failed_when: false
          changed_when: false
        - name: Delete inline certificate
          ansible.builtin.command:
            argv: [consul, config, delete, -kind, inline-certificate, -name, api-gw-certificate]
          failed_when: false
          changed_when: false
        - name: Delete API gateway
          ansible.builtin.command:
            argv: [consul, config, delete, -kind, api-gateway, -name, api-gateway]
          failed_when: false
          changed_when: false
        - name: Delete existing binding rules
          ansible.builtin.command:
            argv: [consul, acl, binding-rule, list, -format, json]
          register: binding_rules
          changed_when: false
          failed_when: false
        - name: Remove binding rules
          ansible.builtin.command:
            argv: [consul, acl, binding-rule, delete, -id, "{{ item }}"]
          loop: "{{ (binding_rules.stdout | default('[]')) | from_json | map(attribute='ID') | list }}"
          failed_when: false
          changed_when: false
        - name: Delete ingress namespace
          ansible.builtin.command:
            argv: [nomad, namespace, delete, ingress]
          failed_when: false
          changed_when: false
        - name: Delete auth method
          ansible.builtin.command:
            argv: [consul, acl, auth-method, delete, -name, nomad-workloads]
          failed_when: false
          changed_when: false

    - name: End play when clean_only is set
      ansible.builtin.meta: end_play
      when: clean_only | default(false) | bool

    - name: Read current Consul address host
      ansible.builtin.set_fact:
        consul_addr: "{{ consul_http_addr | regex_replace('^.*://', '') }}"

    - name: Create Consul auth-method config
      ansible.builtin.copy:
        dest: "{{ jwt_file }}"
        mode: "0600"
        content: |
          {
            "JWKSURL": "https://127.0.0.1:4646/.well-known/jwks.json",
            "JWKSCACert": "{{ lookup('file', consul_cacert) | replace('"', '\\"') }}",
            "JWTSupportedAlgs": ["RS256"],
            "BoundAudiences": ["consul.io"],
            "ClaimMappings": {
              "nomad_namespace": "nomad_namespace",
              "nomad_job_id": "nomad_job_id",
              "nomad_task": "nomad_task",
              "nomad_service": "nomad_service"
            }
          }

    - name: Create auth method
      ansible.builtin.command:
        argv: [consul, acl, auth-method, create, -name, nomad-workloads, -type, jwt, -description, JWT auth-method for Nomad services and workloads, -config, "@{{ jwt_file }}"]
      environment:
        CONSUL_HTTP_TOKEN: "{{ consul_http_token }}"
      changed_when: true

    - name: Create ingress namespace
      ansible.builtin.command:
        argv: [nomad, namespace, apply, -description, namespace for Consul API Gateways, ingress]
      changed_when: true

    - name: Create binding-rule config
      ansible.builtin.copy:
        dest: "{{ binding_rule_file }}"
        mode: "0600"
        content: |
          {
            "AuthMethod": "nomad-workloads",
            "Description": "Nomad API gateway",
            "BindType": "templated-policy",
            "BindName": "builtin/api-gateway",
            "BindVars": {
              "Name": "${value.nomad_job_id}"
            },
            "Selector": "\"nomad_service\" not in value and value.nomad_namespace==ingress"
          }

    - name: Write binding-rule
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --header
          - "X-Consul-Token: {{ consul_http_token }}"
          - --connect-to
          - "{{ consul_tls_server_name }}:8443:{{ consul_addr }}"
          - --cacert
          - "{{ consul_cacert }}"
          - --data
          - "@{{ binding_rule_file }}"
          - --request
          - PUT
          - "https://{{ consul_tls_server_name }}:8443/v1/acl/binding-rule"
      changed_when: true

    - name: Generate TLS config
      ansible.builtin.copy:
        dest: "{{ ssl_conf_file }}"
        mode: "0600"
        content: |
          [req]
          default_bit = 4096
          distinguished_name = req_distinguished_name
          prompt = no

          [req_distinguished_name]
          countryName = US
          stateOrProvinceName = California
          localityName = San Francisco
          organizationName = HashiCorp
          commonName = hashicups.hashicorp.com

    - name: Generate private key
      ansible.builtin.command:
        argv: [openssl, genrsa, -out, "{{ ssl_key_file }}", "4096"]
        creates: "{{ ssl_key_file }}"
      changed_when: true

    - name: Generate CSR
      ansible.builtin.command:
        argv: [openssl, req, -new, -key, "{{ ssl_key_file }}", -out, "{{ ssl_csr_file }}", -config, "{{ ssl_conf_file }}"]
        creates: "{{ ssl_csr_file }}"
      changed_when: true

    - name: Generate certificate
      ansible.builtin.command:
        argv: [openssl, x509, -req, -days, "3650", -in, "{{ ssl_csr_file }}", -signkey, "{{ ssl_key_file }}", -out, "{{ ssl_crt_file }}"]
        creates: "{{ ssl_crt_file }}"
      changed_when: true

    - name: Read TLS assets
      ansible.builtin.slurp:
        src: "{{ item }}"
      register: tls_assets
      loop:
        - "{{ ssl_key_file }}"
        - "{{ ssl_crt_file }}"

    - name: Create inline certificate config
      ansible.builtin.copy:
        dest: "{{ gw_certificate_file }}"
        mode: "0600"
        content: |
          Kind = "inline-certificate"
          Name = "api-gw-certificate"

          Certificate = <<EOT
          {{ tls_assets.results[1].content | b64decode }}
          EOT

          PrivateKey = <<EOT
          {{ tls_assets.results[0].content | b64decode }}
          EOT

    - name: Write inline certificate
      ansible.builtin.command:
        argv: [consul, config, write, "{{ gw_certificate_file }}"]
      changed_when: true

    - name: Create gateway config
      ansible.builtin.copy:
        dest: "{{ gw_config_file }}"
        mode: "0600"
        content: |
          Kind = "api-gateway"
          Name = "api-gateway"

          Listeners = [
              {
                  Port = 8443
                  Name = "api-gw-listener"
                  Protocol = "http"
                  TLS = {
                      Certificates = [
                          {
                              Kind = "inline-certificate"
                              Name = "api-gw-certificate"
                          }
                      ]
                  }
              }
          ]

    - name: Write gateway config
      ansible.builtin.command:
        argv: [consul, config, write, "{{ gw_config_file }}"]
      changed_when: true

    - name: Create route config
      ansible.builtin.copy:
        dest: "{{ gw_route_file }}"
        mode: "0600"
        content: |
          Kind = "http-route"
          Name = "hashicups-http-route"

          Rules = [
            {
              Matches = [
                {
                  Path = {
                    Match = "prefix"
                    Value = "/"
                  }
                }
              ]
              Services = [
                {
                  Name = "nginx"
                }
              ]
            }
          ]

          Parents = [
            {
              Kind = "api-gateway"
              Name = "api-gateway"
              SectionName = "api-gw-listener"
            }
          ]

    - name: Write route config
      ansible.builtin.command:
        argv: [consul, config, write, "{{ gw_route_file }}"]
      changed_when: true
