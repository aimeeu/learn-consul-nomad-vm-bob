---
# Ansible Playbook: Configure HashiStack Servers
# Converts user-data-server.sh to Ansible for configuring Consul and Nomad servers
# Usage: ansible-playbook -i inventory.ini configure-servers.yml

- name: Configure HashiStack Servers
  hosts: servers
  become: yes
  vars:
    # Cluster configuration
    datacenter: "dc1"
    domain: "global"
    cloud_env: "aws"
    server_count: 3
    
    # Directory paths
    config_dir: "/ops/shared/conf"
    consul_config_dir: "/etc/consul.d"
    vault_config_dir: "/etc/vault.d"
    nomad_config_dir: "/etc/nomad.d"
    consul_template_config_dir: "/etc/consul-template.d"
    
    # Policy file paths
    jwt_file: "/tmp/jwt-config.json"
    nomad_tasks_policy_file: "/tmp/policy-nomad-tasks.hcl"
    
    # These should be provided via extra-vars or vault
    consul_encryption_key: "{{ lookup('env', 'CONSUL_ENCRYPTION_KEY') }}"
    nomad_encryption_key: "{{ lookup('env', 'NOMAD_ENCRYPTION_KEY') }}"
    consul_management_token: "{{ lookup('env', 'CONSUL_MANAGEMENT_TOKEN') }}"
    nomad_management_token: "{{ lookup('env', 'NOMAD_MANAGEMENT_TOKEN') }}"
    
    # Certificate variables (base64 encoded, gzipped)
    ca_certificate: "{{ lookup('env', 'CA_CERTIFICATE') }}"
    agent_certificate: "{{ lookup('env', 'AGENT_CERTIFICATE') }}"
    agent_key: "{{ lookup('env', 'AGENT_KEY') }}"
    
  tasks:
    # =========================================================================
    # Setup and Prerequisites
    # =========================================================================
    
    - name: Create log directory
      file:
        path: /var/log
        state: directory
        mode: '0755'
        
    - name: Wait for network to be ready
      wait_for:
        timeout: 15
      delegate_to: localhost
      
    # =========================================================================
    # Retrieve and Install Certificates
    # =========================================================================
    
    - name: Decode and decompress CA certificate
      shell: |
        echo "{{ ca_certificate }}" | base64 -d | zcat > /tmp/agent-ca.pem
      when: ca_certificate != ""
      
    - name: Decode and decompress agent certificate
      shell: |
        echo "{{ agent_certificate }}" | base64 -d | zcat > /tmp/agent.pem
      when: agent_certificate != ""
      
    - name: Decode and decompress agent key
      shell: |
        echo "{{ agent_key }}" | base64 -d | zcat > /tmp/agent-key.pem
      when: agent_key != ""
      
    - name: Copy certificates to Consul config directory
      copy:
        src: "/tmp/{{ item.src }}"
        dest: "{{ consul_config_dir }}/{{ item.dest }}"
        remote_src: yes
        mode: '0600'
      loop:
        - { src: 'agent-ca.pem', dest: 'consul-agent-ca.pem' }
        - { src: 'agent.pem', dest: 'consul-agent.pem' }
        - { src: 'agent-key.pem', dest: 'consul-agent-key.pem' }
      when: ca_certificate != ""
      
    - name: Copy certificates to Nomad config directory
      copy:
        src: "/tmp/{{ item.src }}"
        dest: "{{ nomad_config_dir }}/{{ item.dest }}"
        remote_src: yes
        mode: '0600'
      loop:
        - { src: 'agent-ca.pem', dest: 'nomad-agent-ca.pem' }
        - { src: 'agent.pem', dest: 'nomad-agent.pem' }
        - { src: 'agent-key.pem', dest: 'nomad-agent-key.pem' }
      when: ca_certificate != ""
      
    # =========================================================================
    # Gather IP Addresses
    # =========================================================================
    
    - name: Get Docker bridge IP address
      shell: ip -brief addr show docker0 | awk '{print $3}' | awk -F/ '{print $1}'
      register: docker_bridge_ip
      changed_when: false
      
    - name: Get instance IP address (AWS)
      block:
        - name: Get AWS metadata token
          uri:
            url: http://instance-data/latest/api/token
            method: PUT
            headers:
              X-aws-ec2-metadata-token-ttl-seconds: "21600"
            return_content: yes
          register: aws_token
          
        - name: Get private IP from AWS metadata
          uri:
            url: http://instance-data/latest/meta-data/local-ipv4
            headers:
              X-aws-ec2-metadata-token: "{{ aws_token.content }}"
            return_content: yes
          register: private_ip
          
        - name: Get public IP from AWS metadata
          uri:
            url: http://instance-data/latest/meta-data/public-ipv4
            headers:
              X-aws-ec2-metadata-token: "{{ aws_token.content }}"
            return_content: yes
          register: public_ip
      when: cloud_env == "aws"
      
    - name: Set IP address facts
      set_fact:
        ip_address: "{{ private_ip.content if cloud_env == 'aws' else ansible_default_ipv4.address }}"
        public_ip_address: "{{ public_ip.content if cloud_env == 'aws' else ansible_default_ipv4.address }}"
        docker_bridge_ip_address: "{{ docker_bridge_ip.stdout }}"
        
    # =========================================================================
    # Configure and Start Consul Server
    # =========================================================================
    
    - name: Generate retry_join string for Consul
      set_fact:
        consul_retry_join: "provider=aws tag_key=ConsulJoinTag tag_value=auto-join"
      when: cloud_env == "aws"
      
    - name: Deploy Consul server configuration from template
      template:
        src: templates/consul-server.hcl.j2
        dest: "{{ consul_config_dir }}/consul.hcl"
        mode: '0640'
        
    - name: Deploy Consul bootstrap token configuration
      template:
        src: templates/consul-server-tokens-bootstrap.hcl.j2
        dest: "{{ consul_config_dir }}/consul_tokens.hcl"
        mode: '0640'
        
    - name: Enable Consul service
      systemd:
        name: consul
        enabled: yes
        
    - name: Start Consul service
      systemd:
        name: consul
        state: started
        
    - name: Wait for Consul to be ready
      wait_for:
        port: 8500
        delay: 10
        timeout: 60
        
    - name: Wait additional time for cluster formation
      pause:
        seconds: 30
        
    # =========================================================================
    # Generate Consul ACL Tokens
    # =========================================================================
    
    - name: Create Consul server agent token
      shell: |
        CONSUL_HTTP_TOKEN={{ consul_management_token }} consul acl token create \
          -description="Server Agent token for {{ inventory_hostname }}" \
          --format json \
          -templated-policy="builtin/node" \
          -var name:{{ inventory_hostname }}
      register: consul_server_token_output
      environment:
        CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
        
    - name: Extract Consul server token
      set_fact:
        consul_server_token: "{{ (consul_server_token_output.stdout | from_json).SecretID }}"
        
    - name: Set Consul agent token
      shell: |
        CONSUL_HTTP_TOKEN={{ consul_management_token }} consul acl set-agent-token agent {{ consul_server_token }}
      environment:
        CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
        
    - name: Create Consul DNS token
      shell: |
        CONSUL_HTTP_TOKEN={{ consul_management_token }} consul acl token create \
          -description="Server Default token for {{ inventory_hostname }}" \
          --format json \
          -templated-policy="builtin/dns"
      register: consul_dns_token_output
      environment:
        CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
        
    - name: Extract Consul DNS token
      set_fact:
        consul_dns_token: "{{ (consul_dns_token_output.stdout | from_json).SecretID }}"
        
    - name: Set Consul default token
      shell: |
        CONSUL_HTTP_TOKEN={{ consul_management_token }} consul acl set-agent-token default {{ consul_dns_token }}
      environment:
        CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
        
    # =========================================================================
    # Configure and Start Nomad Server
    # =========================================================================
    
    - name: Create Nomad server Consul token
      shell: |
        CONSUL_HTTP_TOKEN={{ consul_management_token }} consul acl token create \
          -description="Nomad server auto-join token for {{ inventory_hostname }}" \
          --format json \
          -templated-policy="builtin/nomad-server"
      register: nomad_consul_token_output
      environment:
        CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
        
    - name: Extract Nomad Consul token
      set_fact:
        consul_agent_token: "{{ (nomad_consul_token_output.stdout | from_json).SecretID }}"
        
    - name: Deploy Nomad server configuration from template
      template:
        src: templates/nomad-server.hcl.j2
        dest: "{{ nomad_config_dir }}/nomad.hcl"
        mode: '0640'
        
    - name: Enable Nomad service
      systemd:
        name: nomad
        enabled: yes
        
    - name: Start Nomad service
      systemd:
        name: nomad
        state: started
        
    - name: Wait for Nomad to be ready
      wait_for:
        port: 4646
        delay: 5
        timeout: 60
        
    # =========================================================================
    # Configure Consul Template
    # =========================================================================
    
    - name: Deploy Consul Template configuration
      copy:
        src: "{{ config_dir }}/agent-config-consul_template.hcl"
        dest: "{{ consul_template_config_dir }}/consul-template.hcl"
        remote_src: yes
        mode: '0640'
        
    - name: Deploy Consul Template systemd service
      copy:
        src: "{{ config_dir }}/systemd-service-consul_template.service"
        dest: "/etc/systemd/system/consul-template.service"
        remote_src: yes
        mode: '0644'
        
    # =========================================================================
    # Configure DNS
    # =========================================================================
    
    - name: Add hostname to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ inventory_hostname }}"
        
    - name: Create systemd-resolved config directory
      file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: '0755'
        
    - name: Deploy systemd-resolved Consul DNS configuration
      template:
        src: templates/systemd-resolved-consul.conf.j2
        dest: /etc/systemd/resolved.conf.d/consul.conf
        mode: '0644'
        
    - name: Restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
        
    # =========================================================================
    # Bootstrap Nomad ACL (run only on first server)
    # =========================================================================
    
    - name: Bootstrap Nomad ACL
      block:
        - name: Attempt Nomad ACL bootstrap
          shell: |
            export NOMAD_ADDR="https://localhost:4646"
            export NOMAD_CACERT="{{ nomad_config_dir }}/nomad-agent-ca.pem"
            echo "{{ nomad_management_token }}" | nomad acl bootstrap -
          register: nomad_bootstrap_result
          failed_when: false
          retries: 12
          delay: 5
          until: nomad_bootstrap_result.rc == 0 or "already bootstrapped" in nomad_bootstrap_result.stderr
          
        - name: Wait for Nomad cluster to stabilize
          pause:
            seconds: 30
      when: inventory_hostname == groups['servers'][0]
      
    # =========================================================================
    # Configure Consul-Nomad ACL Integration (run only on first server)
    # =========================================================================
    
    - name: Configure Consul-Nomad workload identity integration
      block:
        - name: Create JWT configuration file
          copy:
            content: |
              {
                "JWKSURL": "https://127.0.0.1:4646/.well-known/jwks.json",
                "JWTSupportedAlgs": ["RS256"],
                "BoundAudiences": ["consul.io"],
                "ClaimMappings": {
                  "nomad_namespace": "nomad_namespace",
                  "nomad_job_id": "nomad_job_id",
                  "nomad_task": "nomad_task",
                  "nomad_service": "nomad_service"
                }
              }
            dest: "{{ jwt_file }}"
            mode: '0644'
            
        - name: Create Consul auth-method for Nomad workloads
          shell: |
            consul acl auth-method create \
              -name 'nomad-workloads' \
              -type 'jwt' \
              -description 'JWT auth-method for Nomad services and workloads' \
              -config "@{{ jwt_file }}"
          environment:
            CONSUL_HTTP_TOKEN: "{{ consul_management_token }}"
            CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
            
        - name: Create Consul binding rule for Nomad services
          shell: |
            consul acl binding-rule create \
              -method 'nomad-workloads' \
              -description 'Binding rule for Nomad services authenticated using a workload identity' \
              -bind-type 'service' \
              -bind-name '${value.nomad_service}' \
              -selector '"nomad_service" in value'
          environment:
            CONSUL_HTTP_TOKEN: "{{ consul_management_token }}"
            CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
            
        - name: Create Consul binding rule for Nomad tasks
          shell: |
            consul acl binding-rule create \
              -method 'nomad-workloads' \
              -description 'Binding rule for Nomad tasks authenticated using a workload identity' \
              -bind-type 'role' \
              -bind-name 'nomad-${value.nomad_namespace}-tasks' \
              -selector '"nomad_service" not in value'
          environment:
            CONSUL_HTTP_TOKEN: "{{ consul_management_token }}"
            CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
            
        - name: Create Nomad tasks policy file
          copy:
            content: |
              key_prefix "" {
                policy = "read"
              }
              
              node_prefix "" {
                policy = "read"
              }
              
              service_prefix "" {
                policy = "write"
              }
            dest: "{{ nomad_tasks_policy_file }}"
            mode: '0644'
            
        - name: Create Consul ACL policy for Nomad tasks
          shell: |
            consul acl policy create \
              -name 'policy-nomad-tasks' \
              -description 'ACL policy used by Nomad tasks' \
              -rules @{{ nomad_tasks_policy_file }}
          environment:
            CONSUL_HTTP_TOKEN: "{{ consul_management_token }}"
            CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
            
        - name: Create Consul ACL role for Nomad tasks
          shell: |
            consul acl role create \
              -name 'nomad-default-tasks' \
              -description 'ACL role for Nomad tasks in the default Nomad namespace' \
              -policy-name 'policy-nomad-tasks'
          environment:
            CONSUL_HTTP_TOKEN: "{{ consul_management_token }}"
            CONSUL_HTTP_ADDR: "http://127.0.0.1:8500"
      when: inventory_hostname == groups['servers'][0]
      
    # =========================================================================
    # Cleanup temporary files
    # =========================================================================
    
    - name: Remove temporary certificate files
      file:
        path: "/tmp/{{ item }}"
        state: absent
      loop:
        - agent-ca.pem
        - agent.pem
        - agent-key.pem
        
    - name: Remove temporary policy files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ jwt_file }}"
        - "{{ nomad_tasks_policy_file }}"
      when: inventory_hostname == groups['servers'][0]

